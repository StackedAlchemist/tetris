<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Arcane Tetris — Stacked Alchemist</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <a href="../index.html" class="back-link">← Portfolio</a>

  <div class="bg-orbs">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- ── Start Screen ── -->
  <div id="startScreen" class="overlay">
    <div class="overlay-panel">
      <div class="overlay-runes" aria-hidden="true">
        <span>✦</span><span>◈</span><span>✧</span><span>⬡</span>
      </div>
      <h1 class="overlay-title">Arcane Tetris</h1>
      <p class="overlay-sub">Align the arcane sigils before they collapse into chaos.</p>
      <button class="btn-primary" id="startBtn">Begin the Ritual</button>
      <div class="controls-hint">
        <div>← → / A D &nbsp; Move</div>
        <div>↑ / W &nbsp; Rotate &nbsp;&nbsp; ↓ / S &nbsp; Soft Drop</div>
        <div>Space &nbsp; Hard Drop &nbsp;&nbsp; P &nbsp; Pause</div>
        <div>C / Shift &nbsp; Hold Piece</div>
      </div>
    </div>
  </div>

  <!-- ── Pause Screen ── -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="overlay-panel small">
      <h2 class="overlay-title" style="font-size:1.6rem">Paused</h2>
      <div class="overlay-btns">
        <button class="btn-primary" id="resumeBtn">Resume</button>
        <button class="btn-secondary" id="pauseQuitBtn">Quit</button>
      </div>
    </div>
  </div>

  <!-- ── Game Over Screen ── -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="overlay-panel small">
      <h2 class="overlay-title" style="font-size:1.6rem;color:#ff5050">Game Over</h2>
      <div class="go-stats">
        <div class="go-stat"><span class="go-label">SCORE</span><span class="go-val" id="finalScore">0</span></div>
        <div class="go-stat"><span class="go-label">BEST</span><span class="go-val" id="finalBest">0</span></div>
        <div class="go-stat"><span class="go-label">LEVEL</span><span class="go-val" id="finalLevel">1</span></div>
        <div class="go-stat"><span class="go-label">LINES</span><span class="go-val" id="finalLines">0</span></div>
      </div>
      <div class="overlay-btns">
        <button class="btn-primary" id="restartBtn">Play Again</button>
        <button class="btn-secondary" id="goQuitBtn">Menu</button>
      </div>
    </div>
  </div>

  <!-- ── Game Layout ── -->
  <main class="game-layout" id="gameLayout">

    <!-- Left HUD -->
    <div class="hud hud-left">
      <div class="hud-block">
        <div class="hud-label">SCORE</div>
        <div class="hud-val" id="score">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">BEST</div>
        <div class="hud-val" id="best">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">LEVEL</div>
        <div class="hud-val" id="level">1</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">LINES</div>
        <div class="hud-val" id="lines">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">MULT</div>
        <div class="hud-val" id="mult">×1.00</div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Right HUD -->
    <div class="hud hud-right">
      <div class="hud-block">
        <div class="hud-label">NEXT</div>
        <canvas id="nextCanvas" width="100" height="100"></canvas>
      </div>
      <div class="hud-block">
        <div class="hud-label">HOLD</div>
        <canvas id="holdCanvas" width="100" height="100"></canvas>
      </div>
      <div class="hud-btns">
        <button class="btn-hud" id="pauseBtn">Pause</button>
        <button class="btn-hud btn-hud-quit" id="quitBtn">Quit</button>
      </div>
    </div>

  </main>

  <!-- ── Touch Controls ── -->
  <div class="touch-row" id="touchRow">
    <button class="t-btn" id="tLeft">◀</button>
    <button class="t-btn" id="tDown">▼</button>
    <button class="t-btn t-rotate" id="tRotate">↻</button>
    <button class="t-btn t-drop" id="tDrop">⚡</button>
    <button class="t-btn" id="tRight">▶</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
